name: Build and push Docker repo image

on:
  workflow_dispatch:
    inputs:
        base_image:
          default: "ghcr.io/eliteaai/pylon:1.2.25"
          description: "Docker image name and tag (base)"
          required: true
        bundle_object:
          default: ""
          description: "Bundle object key"
          required: true
        docker_tag:
          default: "ghcr.io/eliteaai/repo:latest"
          description: "Docker image name and tag (result)"
          required: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        id: buildx

      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          tags: ${{ inputs.docker_tag }}
          builder: ${{ steps.buildx.outputs.name }}
          platforms: linux/amd64
          push: true
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=true
            BASE_IMAGE=${{ inputs.base_image }}
            BUNDLE_OBJECT=${{ inputs.bundle_object }}
