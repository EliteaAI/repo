#
# General server config
#
server:
  name: ${PYLON_NAME}
  path: /
  mode: ${PYLON_MODE}
  proxy:
    x_for: 2
    x_proto: 1
    x_host: 1
  host: "0.0.0.0"
  port: 8080
  health:
    healthz: true
    livez: true
    readyz: true

#
# Logging
#
log:
  level: info

#
# Pylon DB
#
pylon_db:
  engine_url: sqlite:////data/pylon.db

#
# Local paths to modules and config
#
modules:
  plugins:
    provider:
      type: folder
      path: /data/plugins
  #
  requirements:
    mode: relaxed
    activation: bulk
    cache: /data/cache/pip
    provider:
      type: folder
      path: /data/requirements
  #
  config:
    provider:
      type: folder
      path: /data/configs
  #
  preload:
    bootstrap:
      provider:
        type: git
        delete_git_dir: false
        depth: null
      source: https://github.com/EliteaAI/bootstrap.git
      branch: main

#
# App DB
#
db:
  engine_url: sqlite:////data/app.db

#
# Settings for Flask application
#
application:
  SECRET_KEY: ${PYLON_APPKEY}
  SESSION_COOKIE_NAME: elitea_repo_session
  SESSION_COOKIE_PATH: /
  SESSION_COOKIE_HTTPONLY: true
  SESSION_COOKIE_SECURE: true
  PREFERRED_URL_SCHEME: https
